name: vastrax
description: Ultra-modern fashion e-commerce platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.2.0
  cloud_firestore: ^6.0.0
  firebase_auth: ^6.0.0
  firebase_storage: ^13.0.0
  
  # State Management
  provider: ^6.1.2
  get: ^4.7.3
  
  # UI / Animations
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_svg: ^2.2.0
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  
  # Routing
  go_router: ^16.2.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  http: ^1.3.0
  shared_preferences: ^2.3.3
  device_info_plus: ^12.1.0
  
  # Payment
  razorpay_flutter: ^1.3.7
  
  icons_launcher: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - dummy_pictures/
    
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

icons_launcher:
  image_path: "assets/icons/logo.png"
  adaptive_background_color: "#ffffff"
  platforms:
    android:
      enabled: true
    ios:
      enabled: true
    web:
      enabled: true
