name: vastrax
description: Ultra-modern fashion e-commerce platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.2.0
  cloud_firestore: ^6.0.0
  firebase_auth: ^6.0.0
  firebase_storage: ^13.0.0
  
  # State Management
  provider: ^6.1.2
  get: ^4.7.3
  
  # UI / Animations
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_svg: ^2.2.0
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  
  # Routing
  go_router: ^16.2.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  http: ^1.3.0
  shared_preferences: ^2.3.3
  device_info_plus: ^12.1.0
  
  # Payment
  razorpay_flutter: ^1.3.7
  
  google_fonts: ^6.2.1
  icons_launcher: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - dummy_pictures/
    - dummy_pictures/AATMA/
    - dummy_pictures/AATMA/bag/
    - dummy_pictures/AATMA/hat/
    - dummy_pictures/AATMA/meditation_box/
    - dummy_pictures/AATMA/shoe/
    - dummy_pictures/AATMA/sneakers/
    - dummy_pictures/AATMA/tote_bag/
    - dummy_pictures/ANTIM/
    - dummy_pictures/ANTIM/bag/
    - dummy_pictures/ANTIM/hat/
    - dummy_pictures/ANTIM/shoe/
    - dummy_pictures/ANTIM/sneakers/
    - dummy_pictures/ANTIM/tote_bag/
    - dummy_pictures/PRITHVI_AND_DHAGA/
    - dummy_pictures/PRITHVI_AND_DHAGA/bag/
    - dummy_pictures/PRITHVI_AND_DHAGA/hat/
    - dummy_pictures/PRITHVI_AND_DHAGA/sneakers/
    - dummy_pictures/PRITHVI_AND_DHAGA/textile_map/
    - dummy_pictures/PRITHVI_AND_DHAGA/tote_bag/
    - dummy_pictures/RUDRA/
    - dummy_pictures/RUDRA/amulet/
    - dummy_pictures/RUDRA/bag/
    - dummy_pictures/RUDRA/sneakers/
    - dummy_pictures/RUDRA/textile_map/
    - dummy_pictures/RUDRA/tote_bag/
    - dummy_pictures/SHUNYA/
    - dummy_pictures/SHUNYA/bag/
    - dummy_pictures/SHUNYA/hat/
    - dummy_pictures/SHUNYA/shoe/
    - dummy_pictures/SHUNYA/sneakers/
    - dummy_pictures/SHUNYA/tote_bag/
    

icons_launcher:
  image_path: "assets/icons/logo.png"
  adaptive_background_color: "#ffffff"
  platforms:
    android:
      enabled: true
    ios:
      enabled: true
    web:
      enabled: true
